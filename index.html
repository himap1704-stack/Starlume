<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/IkonStarlume.png" />
  <title>Starlume · Premium Music Experience</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
      color: #FFFFFF;
      padding-bottom: 2rem;
      min-height: 100vh;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #1a1a1a;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      border-radius: 10px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    /* NAVBAR PREMIUM */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      background: rgba(10, 10, 10, 0.7);
      backdrop-filter: blur(20px);
      padding: 0.8rem 2rem;
      border-radius: 100px;
      border: 1px solid rgba(255, 215, 0, 0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .logo-icon {
      font-size: 2rem;
      filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
      animation: starPulse 2s ease-in-out infinite;
    }

    @keyframes starPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    .logo-text {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FFD700, #FFA500, #FFD700);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 3px;
    }

    .logo-badge {
      font-size: 0.7rem;
      background: rgba(255, 215, 0, 0.2);
      padding: 2px 8px;
      border-radius: 20px;
      color: #FFD700;
      margin-left: 8px;
    }

    .nav-links {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .nav-btn {
      background: transparent;
      border: 1px solid rgba(255, 215, 0, 0.3);
      padding: 0.5rem 1.5rem;
      border-radius: 40px;
      color: #FFFFFF;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
    }

    .nav-btn.active, .nav-btn:hover {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #000000;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
      border-color: transparent;
      transform: translateY(-2px);
    }

    /* HERO SPECTACULAR */
    .hero {
      background: url('icons/20.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      padding: 4rem 2rem;
      border-radius: 2rem;
      margin-bottom: 2.5rem;
      text-align: center;
      border: 1px solid rgba(255, 215, 0, 0.2);
      position: relative;
      overflow: hidden;
    }

    /* Tambahan overlay gelap tipis biar teks tetap terbaca */
    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .hero h2, .hero p {
      position: relative;
      z-index: 1;
    }

    .hero h2 {
      font-size: 3.2rem;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #FFD700, #FFA500, #FFD700, #FFFFFF);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 800;
      letter-spacing: 4px;
      position: relative;
      display: inline-block;
      animation: textShine 3s ease-in-out infinite;
    }

    @keyframes textShine {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }

    .hero h2::before {
      content: '✦';
      position: absolute;
      left: -40px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2rem;
      color: #FFD700;
      opacity: 0.8;
    }

    .hero h2::after {
      content: '✦';
      position: absolute;
      right: -40px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2rem;
      color: #FFD700;
      opacity: 0.8;
    }

    .hero p {
      color: #CCCCCC;
      font-size: 1.1rem;
      background: rgba(0, 0, 0, 0.5);
      display: inline-block;
      padding: 0.5rem 2rem;
      border-radius: 60px;
      backdrop-filter: blur(8px);
      margin-top: 0.5rem;
      border: 1px solid rgba(255, 215, 0, 0.2);
    }

    /* STATS BAR */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      padding: 0.8rem 1.8rem;
      border-radius: 60px;
      border: 1px solid rgba(255, 215, 0, 0.15);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .stat-number {
      font-size: 1.6rem;
      font-weight: 800;
      color: #FFD700;
    }

    .stat-label {
      font-size: 0.85rem;
      color: #AAAAAA;
    }

    .mood-section {
      margin-bottom: 2rem;
    }

    .section-title {
      text-align: center;
      margin-bottom: 2rem;
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #FFFFFF, #FFD700);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 1px;
    }

    /* MOOD BUTTONS MIUM */
    .mood-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .mood-btn {
      background: rgba(20, 20, 20, 0.8);
      backdrop-filter: blur(8px);
      padding: 0.9rem 2rem;
      border-radius: 60px;
      font-size: 1rem;
      font-weight: 600;
      border: 1px solid rgba(255, 215, 0, 0.2);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      color: #FFFFFF;
      position: relative;
      overflow: hidden;
    }

    .mood-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 215, 0, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .mood-btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .mood-btn:hover, .mood-btn.active {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #000000;
      transform: translateY(-4px) scale(1.02);
      border-color: transparent;
      box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
    }

    .results-container {
      margin-top: 1rem;
      animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 2rem;
    }

    /* MUSIC CARD PREMIUM */
    .music-card {
      background: linear-gradient(135deg, rgba(20, 20, 20, 0.9), rgba(15, 15, 15, 0.95));
      backdrop-filter: blur(10px);
      border-radius: 1.5rem;
      overflow: hidden;
      border: 1px solid rgba(255, 215, 0, 0.1);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .music-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #FFD700, #FFA500, #FFD700);
      transform: scaleX(0);
      transition: transform 0.4s ease;
    }

    .music-card:hover::after {
      transform: scaleX(1);
    }

    .music-card:hover {
      transform: translateY(-10px);
      border-color: rgba(255, 215, 0, 0.4);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
    }

    .card-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .music-card:hover .card-img {
      transform: scale(1.05);
    }

    .card-body {
      padding: 1.3rem;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #FFFFFF;
      margin-bottom: 8px;
    }

    .artist-name {
      font-size: 0.85rem;
      color: #FFD700;
      margin-bottom: 8px;
    }

    .fav-icon {
      cursor: pointer;
      font-size: 1.5rem;
      transition: all 0.2s ease;
    }

    .fav-icon:hover {
      transform: scale(1.2);
    }

    .fav-icon.active {
      color: #FFD700;
      text-shadow: 0 0 12px rgba(255, 215, 0, 0.8);
      animation: starPop 0.3s ease;
    }

    @keyframes starPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    .music-quote {
      background: rgba(255, 215, 0, 0.05);
      padding: 0.8rem 1rem;
      border-radius: 14px;
      margin: 12px 0;
      font-size: 0.8rem;
      line-height: 1.5;
      color: #CCCCCC;
      border-left: 3px solid #FFD700;
      font-style: italic;
      transition: 0.2s;
    }

    .music-card:hover .music-quote {
      background: rgba(255, 215, 0, 0.08);
    }

    .track-links {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    .track-links a {
      color: #FFFFFF;
      font-size: 0.8rem;
      font-weight: 600;
      text-decoration: none;
      background: rgba(30, 30, 30, 0.9);
      padding: 8px 18px;
      border-radius: 40px;
      transition: all 0.25s ease;
      border: 1px solid rgba(255, 215, 0, 0.2);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      justify-content: center;
    }

    .track-links a:hover {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #000000;
      border-color: transparent;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
    }

    .empty-fav {
      text-align: center;
      padding: 4rem;
      background: linear-gradient(135deg, rgba(20, 20, 20, 0.5), rgba(10, 10, 10, 0.5));
      border-radius: 2rem;
      margin: 1rem 0;
      color: #AAAAAA;
      border: 1px dashed rgba(255, 215, 0, 0.3);
    }

    .toast-msg {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
      border-left: 4px solid #FFD700;
      padding: 0.8rem 1.8rem;
      border-radius: 50px;
      backdrop-filter: blur(20px);
      z-index: 999;
      animation: slideInRight 0.3s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      color: white;
      font-weight: 500;
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(60px);}
      to { opacity: 1; transform: translateX(0);}
    }

    .back-btn {
      background: rgba(30,30,30,0.8);
      border: 1px solid rgba(255, 215, 0, 0.3);
      padding: 0.6rem 1.8rem;
      border-radius: 40px;
      color: #FFFFFF;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(4px);
    }

    .back-btn:hover {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #000000;
      transform: translateX(-5px);
      border-color: transparent;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      padding-top: 1.5rem;
      opacity: 0.6;
      font-size: 0.8rem;
      color: #888888;
      border-top: 1px solid rgba(255, 215, 0, 0.1);
    }

    @media (max-width: 700px) {
      .container { padding: 1rem; }
      .hero h2 { font-size: 1.6rem; letter-spacing: 2px; }
      .hero h2::before, .hero h2::after { display: none; }
      .hero { padding: 2rem 1rem; }
      .card-grid { grid-template-columns: 1fr; }
      .track-links a { padding: 6px 12px; font-size: 0.7rem; }
      .mood-btn { padding: 0.6rem 1.2rem; font-size: 0.85rem; }
      .logo-text { font-size: 1.2rem; }
      .logo-icon { font-size: 1.5rem; }
      .stat-card { padding: 0.5rem 1rem; }
      .stat-number { font-size: 1.2rem; }
    }
  </style>
</head>

  function showNotif(message) {
    let oldToast = document.querySelector(".toast-msg");
    if(oldToast) oldToast.remove();
    let toast = document.createElement("div");
    toast.className = "toast-msg";
    toast.innerText = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2800);
  }

  function toggleFavorite(songId) {
    const index = favorites.indexOf(songId);
    if(index === -1) {
      favorites.push(songId);
      showNotif("✨ Ditambahkan ke favorit! ✨");
    } else {
      favorites.splice(index,1);
      showNotif("⭐ Dihapus dari favorit");
    }
    saveFav();
    render();
  }

  function isFavorite(songId) { return favorites.includes(songId); }

    const names = { senang:"Senang", sedih:"Sedih", galau:"Galau", romantis:"Romantis", marah:"Marah", fokus:"Fokus", relax:"Relax" };
    return names[moodKey] || moodKey;

              <span class="fav-icon ${isFavorite(song.id) ? 'active' : ''}" data-id="${song.id}">${isFavorite(song.id) ? '★' : '☆'}</span>

            <div class="artist-name">${song.artist}</div>
            <div class="music-quote">

            <div class="track-links">

            </div>
          </div>
        </div>

    });

    return html;
  }

      });
    });

      });
    });

    });
